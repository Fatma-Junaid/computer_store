<!DOCTYPE html>
<html lang="en">
<head>
  <title>Admin - Add Product</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
  <h2>Add Product</h2>

  <form id="productForm">
    <input class="form-control mb-2" placeholder="Name" id="name" required>
    <input class="form-control mb-2" placeholder="Brand" id="brand">
    <input class="form-control mb-2" placeholder="Price" id="price" type="number" required>
    <textarea class="form-control mb-2" placeholder="Description" id="description"></textarea>
    <input class="form-control mb-2" placeholder="Image URL" id="image">
    <input class="form-control mb-2" placeholder="Stock" id="stock" type="number">

    <button class="btn btn-success">Add Product</button>
  </form>
</div>

<script src="/js/admin.js"></script>
</body>
</html>
